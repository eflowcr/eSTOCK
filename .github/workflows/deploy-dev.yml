name: Build & Push Frontend (Dev)

on:
  push:
    branches: [development, develop, dev, jafet-dev]
  workflow_dispatch:

env:
  REGISTRY: ${{ secrets.REGISTRY_HOST }}
  IMAGE_NAME: estock-frontend

jobs:
  type-check:
    name: TypeScript Type-Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate environment (with fallback API_BASE)
        run: node scripts/load-env.js
        env:
          API_BASE: http://localhost:8081/api

      - name: Build (type-check + compile)
        run: npx ng build --configuration development --no-progress

  build-and-push:
    needs: type-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Docker for insecure registry
        run: |
          sudo mkdir -p /etc/docker
          echo '{"insecure-registries": ["${{ secrets.REGISTRY_HOST }}"]}' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-config-inline: |
            [registry."${{ secrets.REGISTRY_HOST }}"]
              http = true
              insecure = true

      - name: Login to VPS Registry
        run: |
          echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login \
            --username "${{ secrets.REGISTRY_USER }}" \
            --password-stdin \
            "${{ secrets.REGISTRY_HOST }}"

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64
          build-args: |
            API_BASE=/api
            ENVIRONMENT=development
            VERSION=dev-${{ github.sha }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev-latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev-${{ github.sha }}
