name: Build & Push Frontend (Dev)

on:
  push:
    branches: [development, develop, dev, jafet-dev]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: eflowcr/estock-frontend

jobs:
  type-check:
    name: TypeScript Type-Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate environment (with fallback API_BASE)
        run: node scripts/load-env.js
        env:
          API_BASE: http://localhost:8081/api

      - name: Build (type-check + compile)
        run: npx ng build --configuration development --no-progress

  build-and-push:
    needs: type-check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64
          build-args: |
            API_BASE=/api
            ENVIRONMENT=development
            VERSION=${{ github.sha }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify
        run: |
          echo "✅ ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest pushed"
          echo "Branch: ${{ github.ref_name }} | SHA: ${{ github.sha }}"
