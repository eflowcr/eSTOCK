<app-main-layout>
  <div class="flex flex-col flex-1 min-h-0 gap-6">
    <div class="flex flex-col gap-4 sm:flex-row sm:justify-between sm:items-center flex-shrink-0">
      <div class="min-w-0">
        <h1 class="text-2xl font-semibold text-foreground">
          {{ t('stock_transfers_management') }}
        </h1>
        <p class="mt-2 text-sm text-muted-foreground">
          {{ t('stock_transfers_management_description') }}
        </p>
      </div>
      <div class="flex items-center gap-2 flex-shrink-0">
        <button type="button" (click)="openCreate()"
          class="inline-flex h-9 items-center gap-1.5 rounded-md bg-primary px-4 text-sm font-medium text-primary-foreground transition-colors hover:bg-primary active:scale-[0.97]">
          <svg class="h-4 w-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path>
          </svg>
          {{ t('create_stock_transfer') }}
        </button>
      </div>
    </div>

    <div class="flex flex-col flex-1 min-h-0">
      <app-stock-transfer-list
        [transfers]="transfers"
        [locations]="locations"
        [isLoading]="isLoading"
        (refresh)="loadTransfers()"
        (editTransfer)="openEdit($event)"
        (deleteTransfer)="deleteTransfer($event)"
        (executeTransfer)="executeTransfer($event)">
      </app-stock-transfer-list>
    </div>

    <app-stock-transfer-form
      *ngIf="formOpen"
      [initialData]="selectedTransfer"
      [lines]="selectedTransferLines"
      [locations]="locations"
      [isOpen]="formOpen"
      (success)="onSuccess()"
      (closed)="closeForm()">
    </app-stock-transfer-form>
  </div>
</app-main-layout>
