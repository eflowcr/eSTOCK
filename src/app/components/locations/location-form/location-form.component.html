<app-drawer [isOpen]="isOpen" (closed)="close()" direction="bottom" panelClass="!max-h-[96vh] w-full max-w-full">
  <div drawerHeader>
    <div class="flex flex-col gap-0.5 md:gap-1.5 text-center md:text-left">
      <div class="flex items-start justify-between gap-4">
        <div class="flex-1 min-w-0">
          <h3 class="text-lg font-semibold text-gray-900 dark:text-white">
            {{ isEditing ? t('edit_location') : t('create_location') }}
          </h3>
          <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">
            {{ isEditing ? t('edit_location_description') : t('create_location_description') }}
          </p>
        </div>
        <button type="button" (click)="close()" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 p-1 flex-shrink-0" aria-label="Close">
          <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <div drawerContent>
    <form id="locationForm" [formGroup]="locationForm" (ngSubmit)="onSubmit()" class="space-y-6 px-1">
      <div class="space-y-6">
        <z-form-field>
          <label z-form-label zRequired for="location_code">{{ t('location_code') }}</label>
          <z-form-control [errorMessage]="(isFieldInvalid('location_code') ? getFieldError('location_code') : null) ?? ''">
            <input z-input type="text" id="location_code" formControlName="location_code"
              [placeholder]="t('enter_location_code')"
              [zStatus]="isFieldInvalid('location_code') ? 'error' : undefined" />
          </z-form-control>
        </z-form-field>

        <z-form-field>
          <label z-form-label for="description">{{ t('location_description') }}</label>
          <z-form-control [errorMessage]="(isFieldInvalid('description') ? getFieldError('description') : null) ?? ''">
            <input z-input type="text" id="description" formControlName="description"
              [placeholder]="t('enter_description')"
              [zStatus]="isFieldInvalid('description') ? 'error' : undefined" />
          </z-form-control>
        </z-form-field>

        <z-form-field>
          <label z-form-label for="zone">{{ t('location_zone') }}</label>
          <z-form-control [errorMessage]="(isFieldInvalid('zone') ? getFieldError('zone') : null) ?? ''">
            <input z-input type="text" id="zone" formControlName="zone"
              [placeholder]="t('enter_zone')"
              [zStatus]="isFieldInvalid('zone') ? 'error' : undefined" />
          </z-form-control>
        </z-form-field>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <z-form-field>
            <label z-form-label zRequired for="type">{{ t('location_type') }}</label>
            <z-form-control [errorMessage]="(isFieldInvalid('type') ? getFieldError('type') : null) ?? ''">
              <z-select
                id="type"
                formControlName="type"
                [zPlaceholder]="t('select_type')"
                class="block w-full"
              >
                <z-select-item *ngFor="let type of locationTypes" [zValue]="type.value">
                  {{ type.label }}
                </z-select-item>
              </z-select>
            </z-form-control>
          </z-form-field>

          <z-form-field>
            <label z-form-label for="is_active">{{ t('location_status') }}</label>
            <z-form-control>
              <z-switch id="is_active" formControlName="is_active">{{ t('active') }}</z-switch>
            </z-form-control>
          </z-form-field>
        </div>
      </div>
    </form>
  </div>

  <div drawerFooter class="flex flex-row gap-2 pb-6">
    <button z-button zType="outline" zSize="lg" type="button" (click)="close()" class="flex-1">
      {{ t('cancel') }}
    </button>
    <button z-button zType="default" zSize="lg" type="submit" form="locationForm"
      [zDisabled]="locationForm.invalid || isSubmitting" [zLoading]="isSubmitting"
      class="flex-1">
      {{ isSubmitting ? t('saving') : (isEditing ? t('update') : t('create')) }}
    </button>
  </div>
</app-drawer>
