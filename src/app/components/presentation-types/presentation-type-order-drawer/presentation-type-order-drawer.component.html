<app-drawer [isOpen]="isOpen" (closed)="close()" direction="bottom" panelClass="!max-h-[96vh] w-full max-w-full">
  <div drawerHeader>
    <div class="flex flex-col gap-0.5 md:gap-1.5 text-center md:text-left">
      <div class="flex items-start justify-between gap-4">
        <div class="flex-1 min-w-0">
          <h3 class="text-lg font-semibold text-foreground">
            {{ t('set_presentation_type_order') }}
          </h3>
          <p class="text-sm text-muted-foreground mt-1">
            {{ t('set_presentation_type_order_description') }}
          </p>
        </div>
        <button type="button" (click)="close()" class="text-muted-foreground hover:text-muted-foreground dark:hover:text-muted-foreground p-1 flex-shrink-0" aria-label="Close">
          <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <div drawerContent class="px-1">
    <ul class="space-y-2">
      @for (type of orderedTypes; track type.id; let i = $index) {
        <li class="flex items-center gap-3 rounded-lg border border-border bg-background px-4 py-3">
          <span class="text-sm font-medium text-muted-foreground w-6">{{ i + 1 }}.</span>
          <span class="flex-1 font-medium text-foreground">{{ type.name }}</span>
          <span class="text-xs font-mono text-muted-foreground">{{ type.code }}</span>
          <div class="flex items-center gap-1">
            <button type="button" (click)="moveUp(i)" [disabled]="i === 0"
              class="p-2 rounded-md text-muted-foreground hover:bg-muted hover:text-muted-foreground disabled:opacity-30 disabled:cursor-not-allowed dark:hover:text-muted-foreground"
              [attr.aria-label]="t('move_up')">
              <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"></path>
              </svg>
            </button>
            <button type="button" (click)="moveDown(i)" [disabled]="i === orderedTypes.length - 1"
              class="p-2 rounded-md text-muted-foreground hover:bg-muted hover:text-muted-foreground disabled:opacity-30 disabled:cursor-not-allowed dark:hover:text-muted-foreground"
              [attr.aria-label]="t('move_down')">
              <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
              </svg>
            </button>
          </div>
        </li>
      } @empty {
        <p class="text-sm text-muted-foreground py-4">{{ t('no_presentation_types') }}</p>
      }
    </ul>
  </div>

  <div drawerFooter class="flex flex-row gap-2 pb-6">
    <button z-button zType="outline" zSize="lg" type="button" (click)="close()" class="flex-1">{{ t('cancel') }}</button>
    <button z-button zType="default" zSize="lg" type="button" (click)="saveOrder()"
      [zDisabled]="orderedTypes.length === 0 || isSaving" [zLoading]="isSaving" class="flex-1">
      {{ isSaving ? t('saving') : t('save_order') }}
    </button>
  </div>
</app-drawer>
