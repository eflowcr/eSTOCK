<app-main-layout>
  <div class="flex flex-col flex-1 min-h-0 gap-6">
    <div class="flex flex-col gap-4 sm:flex-row sm:justify-between sm:items-center flex-shrink-0">
      <div class="min-w-0">
        <h1 class="text-2xl font-semibold text-foreground">
          {{ t('presentation_types_management') }}
        </h1>
        <p class="mt-2 text-sm text-muted-foreground">
          {{ t('presentation_types_management_description') }}
        </p>
      </div>
      <div class="flex items-center gap-2 flex-shrink-0">
        <button type="button" (click)="openOrderDrawer()"
          class="flex items-center px-4 py-2 border-2 border-[#00113f] dark:border-[#3e66ea] rounded-md shadow-sm text-sm font-medium text-foreground dark:text-[#3e66ea] bg-transparent hover:bg-accent dark:hover:bg-primary/10 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary">
          <svg class="h-4 w-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"></path>
          </svg>
          {{ t('set_presentation_type_order') }}
        </button>
        <button type="button" (click)="openCreate()"
          class="inline-flex h-9 items-center gap-1.5 rounded-md bg-primary px-4 text-sm font-medium text-primary-foreground transition-colors hover:bg-primary active:scale-[0.97]">
          <svg class="h-4 w-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path>
          </svg>
          {{ t('create_presentation_type') }}
        </button>
      </div>
    </div>

    <div class="flex flex-col flex-1 min-h-0">
    <app-presentation-type-list
      [types]="types"
      [isLoading]="isLoading"
      (refresh)="loadTypes()"
      (editPresentationType)="openEdit($event)"
      (deletePresentationType)="delete($event)">
    </app-presentation-type-list>
    </div>

    <app-presentation-type-form *ngIf="formOpen" [initialData]="selectedType" [isOpen]="formOpen"
      (success)="onSuccess()" (closed)="closeForm()"></app-presentation-type-form>

    <app-presentation-type-order-drawer [isOpen]="orderDrawerOpen" [types]="types"
      (success)="onOrderSaved()" (closed)="closeOrderDrawer()"></app-presentation-type-order-drawer>
  </div>
</app-main-layout>
