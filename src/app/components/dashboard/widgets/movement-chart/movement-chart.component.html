<app-dashboard-card [title]="t('daily_movement')">
  <!-- Empty state -->
  <ng-container *ngIf="maxValue <= 1 && data.length === 0">
    <div class="h-40 flex items-center justify-center text-sm text-muted-foreground">
      {{ t('no_data') }}
    </div>
  </ng-container>

  <!-- Grouped bar chart -->
  <ng-container *ngIf="data.length > 0">
    <div class="mt-4 flex items-end justify-between gap-1" style="height: 120px;">
      <div *ngFor="let d of data" class="flex flex-1 flex-col items-center gap-1">
        <div class="flex items-end gap-0.5 w-full justify-center" style="height: 100%;">
          <div
            class="w-full max-w-[10px] rounded-t-sm transition-opacity hover:opacity-90"
            [style.height.%]="(d.inbound / maxValue) * 100"
            style="background: var(--chart-1); min-height: 2px;"
          ></div>
          <div
            class="w-full max-w-[10px] rounded-t-sm transition-opacity hover:opacity-90"
            [style.height.%]="(d.outbound / maxValue) * 100"
            style="background: var(--chart-2); min-height: 2px;"
          ></div>
        </div>
        <span class="text-xs text-muted-foreground">{{ d.date.slice(5) }}</span>
      </div>
    </div>
    <div class="mt-4 flex flex-wrap gap-4 border-t border-border pt-4">
      <span class="flex items-center gap-2 text-xs text-muted-foreground">
        <span class="h-3 w-3 rounded-sm shrink-0" style="background: var(--chart-1)"></span>
        {{ t('dashboard.inbound') }}
      </span>
      <span class="flex items-center gap-2 text-xs text-muted-foreground">
        <span class="h-3 w-3 rounded-sm shrink-0" style="background: var(--chart-2)"></span>
        {{ t('dashboard.outbound') }}
      </span>
    </div>
  </ng-container>
</app-dashboard-card>
