<div class="rounded-xl border border-border bg-card shadow-sm">

  <!-- Section header -->
  <div class="flex items-center justify-between border-b border-border px-6 py-4">
    <div>
      <h3 class="text-base font-semibold text-foreground">{{ t('dashboard.attention.title') }}</h3>
      <p class="mt-0.5 text-xs text-muted-foreground">{{ t('dashboard.attention.subtitle') }}</p>
    </div>
    <button type="button" (click)="refresh()" [disabled]="isRefreshing"
      class="inline-flex h-8 w-8 items-center justify-center rounded-md border border-border text-muted-foreground transition-colors hover:bg-accent hover:text-foreground disabled:opacity-50"
      [title]="t('refresh')">
      <svg class="h-4 w-4 transition-transform duration-500"
        [class.animate-spin]="isRefreshing"
        fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
      </svg>
    </button>
  </div>

  <!-- Sub-cards grid -->
  <div class="grid gap-px bg-border sm:grid-cols-2 lg:grid-cols-4">
    <div *ngFor="let card of subCards" class="bg-card p-5">

      <!-- Sub-card header -->
      <div class="flex items-center gap-2">
        <span class="text-lg leading-none" aria-hidden="true">{{ card.icon }}</span>
        <h4 class="text-sm font-semibold text-foreground">{{ t(card.titleKey) }}</h4>
      </div>

      <!-- Loading skeleton -->
      <ng-container *ngIf="card.isLoading">
        <div class="mt-3 space-y-2 animate-pulse">
          <div class="h-8 w-full rounded bg-muted"></div>
          <div class="h-8 w-full rounded bg-muted"></div>
          <div class="h-8 w-3/4 rounded bg-muted"></div>
        </div>
      </ng-container>

      <!-- Items -->
      <ng-container *ngIf="!card.isLoading">
        <div *ngIf="card.items.length === 0"
          class="mt-3 rounded-lg border border-dashed border-border py-4 text-center text-xs text-muted-foreground">
          {{ t(card.emptyKey) }}
        </div>

        <div *ngIf="card.items.length > 0" class="mt-3 space-y-1.5">
          <div *ngFor="let item of card.items"
            class="flex items-center justify-between gap-2 rounded-lg border px-3 py-2 text-xs transition-colors hover:bg-accent"
            [class]="urgencyClass(item.urgency)">
            <div class="min-w-0 flex-1">
              <p class="truncate font-medium">{{ item.label }}</p>
              <p class="text-[10px] opacity-70">{{ item.meta }}</p>
            </div>
            <a [routerLink]="item.link" [queryParams]="item.queryParams"
              class="shrink-0 rounded px-2 py-0.5 text-[10px] font-semibold underline-offset-2 hover:underline">
              {{ t('view') }}
            </a>
          </div>
        </div>
      </ng-container>
    </div>
  </div>
</div>
