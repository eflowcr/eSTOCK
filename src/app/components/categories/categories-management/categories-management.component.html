<app-main-layout>
  <div class="flex flex-col flex-1 min-h-0 gap-6">
    <div class="flex justify-between items-center flex-shrink-0">
      <div>
        <h1 class="text-2xl font-semibold text-foreground">{{ t('categories.title') }}</h1>
        <p class="mt-2 text-sm text-muted-foreground">{{ t('categories.description') }}</p>
      </div>
      <button *ngIf="isAdmin()" type="button" (click)="openCreateRoot()"
        class="inline-flex h-9 items-center gap-1.5 rounded-md bg-primary px-4 text-sm font-medium text-primary-foreground transition-colors hover:bg-primary/90 active:scale-[0.97]">
        <svg class="h-4 w-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/>
        </svg>
        {{ t('categories.new') }}
      </button>
    </div>

    <app-categories-tree
      [tree]="tree"
      [categories]="categories"
      [isLoading]="isLoading"
      (editCategory)="openEdit($event)"
      (addChild)="openCreateChild($event)"
      (categoryArchived)="onCategoryArchived()">
    </app-categories-tree>

    <app-category-form
      *ngIf="isFormOpen"
      [isOpen]="isFormOpen"
      [initialData]="selectedCategory"
      [parentId]="parentIdForNew"
      [allCategories]="categories"
      (success)="onCategorySaved()"
      (closed)="closeForm()">
    </app-category-form>
  </div>
</app-main-layout>
