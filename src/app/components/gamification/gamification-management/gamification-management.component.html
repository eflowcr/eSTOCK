<app-main-layout>
    <!-- Header Section -->
    <div class="flex justify-between items-center">
      <div>
        <h1 class="text-2xl font-semibold text-foreground">{{ t('performance') }}</h1>
        <p class="mt-0.5 text-sm text-muted-foreground">{{ t('gamification.badges_description') }}</p>
      </div>
      
      <!-- Action Buttons -->
      <div class="flex gap-2">
        <!-- Export Button - Available for admins -->
        <button
          *ngIf="isAdmin()"
          type="button"
          (click)="openExportDialog()"
          class="inline-flex h-9 items-center gap-1.5 rounded-md border border-border bg-background px-3 text-sm font-medium text-foreground transition-colors hover:bg-accent hover:text-accent-foreground active:scale-[0.97]"
        >
          <svg class="h-4 w-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
          </svg>
          {{ t('export') }}
        </button>
      </div>
    </div>

    <!-- Gamification Panel -->
    <app-gamification-panel #gamificationPanel></app-gamification-panel>
</app-main-layout>
