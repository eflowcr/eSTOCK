<div class="min-h-screen bg-gradient-to-br from-slate-50 to-slate-100 dark:from-slate-900 dark:to-slate-800 flex items-center justify-center p-8">
  <div class="w-full max-w-md">
    <!-- Logo -->
    <div class="text-center mb-8">
      <img
        src="assets/logo_ePRAC.png"
        alt="ePRAC Logo"
        class="w-32 mx-auto mb-4 drop-shadow-lg"
        style="background: transparent; object-fit: contain; border-radius: 0.5rem"
      />
    </div>

    <div class="bg-background rounded-xl shadow-lg border border-border p-8 text-center space-y-5">
      <!-- Email Icon -->
      <div class="flex justify-center">
        <div class="w-20 h-20 bg-primary/10 rounded-full flex items-center justify-center">
          <svg class="h-10 w-10 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
          </svg>
        </div>
      </div>

      <div class="space-y-2">
        <h2 class="text-2xl font-bold text-foreground">{{ t('signup.check_email_title') }}</h2>
        <p class="text-muted-foreground text-sm leading-relaxed">
          {{ t('signup.check_email_subtitle') }}
        </p>
        <div *ngIf="email" class="bg-primary/5 border border-primary/20 rounded-lg px-4 py-2.5 mt-2">
          <p class="font-medium text-primary text-sm">{{ email }}</p>
        </div>
      </div>

      <div class="space-y-2 text-sm text-muted-foreground">
        <p>{{ t('signup.check_email_hint') }}</p>
        <p class="text-xs">{{ t('signup.check_email_spam') }}</p>
      </div>

      <!-- Divider -->
      <div class="border-t border-border pt-4 space-y-3">
        <p class="text-sm text-muted-foreground">{{ t('signup.check_email_wrong_address') }}</p>
        <a
          routerLink="/signup"
          class="inline-flex items-center gap-2 text-sm text-primary hover:underline font-medium"
        >
          <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
          </svg>
          {{ t('signup.back_to_signup') }}
        </a>
      </div>
    </div>
  </div>
</div>
